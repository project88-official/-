<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>팔팔청과 발주서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --accent: #f77f00;
    --bg: #f8f9fa;
    --white: #ffffff;
    --gray1: #212529;
    --gray2: #495057;
    --gray3: #868e96;
    --gray4: #dee2e6;
    --gray5: #f1f3f5;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--gray1);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* Header */
  .header {
    background: var(--green);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(45,106,79,0.3);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .store-name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .store-name span { color: #a7f3c0; }
  .today-date {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }
  .header-total {
    text-align: right;
  }
  .header-total-label {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }
  .header-total-amount {
    font-size: 22px;
    font-weight: 900;
    color: #a7f3c0;
    letter-spacing: -1px;
  }

  /* Section */
  .section {
    margin: 16px 16px 0;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .section-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--gray5);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-num {
    width: 22px;
    height: 22px;
    background: var(--green);
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray1);
  }

  /* Category Tabs */
  .tabs-wrap {
    overflow-x: auto;
    padding: 12px 16px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 8px;
    width: max-content;
  }
  .tab {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--gray4);
    background: white;
    color: var(--gray2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  /* Product List */
  .product-list {
    padding: 8px 0 4px;
  }
  .product-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray5);
    gap: 12px;
    transition: background 0.15s;
  }
  .product-item:last-child { border-bottom: none; }
  .product-item.selected { background: #f0faf4; }

  .product-info {}
  .product-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray1);
    margin-bottom: 3px;
  }
  .product-meta {
    font-size: 12px;
    color: var(--gray3);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .product-meta-dot {
    width: 2px;
    height: 2px;
    background: var(--gray4);
    border-radius: 50%;
  }
  .product-price {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin-top: 4px;
  }
  .product-subtotal {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
    min-height: 16px;
  }

  .qty-select {
    padding: 7px 10px;
    border: 1.5px solid var(--gray4);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    color: var(--gray1);
    background: white;
    cursor: pointer;
    min-width: 64px;
    text-align: center;
    appearance: auto;
    transition: border-color 0.2s;
  }
  .qty-select:focus {
    outline: none;
    border-color: var(--green);
  }
  .qty-select.has-value {
    border-color: var(--green);
    background: var(--green-pale);
    color: var(--green);
  }

  /* Delivery/Pickup */
  .method-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px;
  }
  .method-btn {
    padding: 14px;
    border-radius: 10px;
    border: 2px solid var(--gray4);
    background: white;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .method-btn.active {
    border-color: var(--green);
    background: var(--green-pale);
  }
  .method-icon { font-size: 22px; margin-bottom: 4px; }
  .method-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray2);
  }
  .method-btn.active .method-label { color: var(--green); }
  .method-sub {
    font-size: 11px;
    color: var(--gray3);
    margin-top: 2px;
  }

  .min-order-notice {
    margin: 0 16px 8px;
    padding: 10px 14px;
    background: #fff3cd;
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-size: 12px;
    color: #856404;
    font-weight: 500;
    display: none;
  }
  .min-order-notice.show { display: block; }

  /* Payment */
  .payment-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 14px 16px;
  }
  .payment-btn {
    padding: 12px 6px;
    border-radius: 10px;
    border: 2px solid var(--gray4);
    background: white;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .payment-btn.active {
    border-color: var(--green);
    background: var(--green-pale);
  }
  .payment-icon { font-size: 20px; margin-bottom: 4px; }
  .payment-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray2);
    line-height: 1.3;
  }
  .payment-btn.active .payment-label { color: var(--green); }

  /* Customer Info */
  .form-fields {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray2);
    margin-bottom: 5px;
  }
  .field-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--gray4);
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--gray1);
    transition: border-color 0.2s;
    background: white;
  }
  .field-input:focus {
    outline: none;
    border-color: var(--green);
  }
  .field-input::placeholder { color: var(--gray3); }
  .address-field { display: none; }
  .address-field.show { display: block; }

  /* Order Summary Bar */
  .order-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--gray4);
    padding: 12px 16px;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .order-bar-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }
  .order-total-wrap { flex: 1; }
  .order-total-label { font-size: 11px; color: var(--gray3); }
  .order-total-amount {
    font-size: 20px;
    font-weight: 900;
    color: var(--gray1);
    letter-spacing: -1px;
  }
  .order-btn {
    padding: 14px 28px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .order-btn:disabled {
    background: var(--gray4);
    color: var(--gray3);
    cursor: not-allowed;
  }
  .order-btn:not(:disabled):active {
    transform: scale(0.97);
    background: #1e4d38;
  }

  .empty-tab {
    padding: 32px 16px;
    text-align: center;
    color: var(--gray3);
    font-size: 13px;
  }

  .category-hidden { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="store-name">팔팔<span>청과</span></div>
      <div class="today-date" id="todayDate"></div>
    </div>
    <div class="header-total">
      <div class="header-total-label">현재 합계</div>
      <div class="header-total-amount" id="headerTotal">0원</div>
    </div>
  </div>
</div>

<!-- 품목/수량 입력 -->
<div class="section">
  <div class="section-header">
    <div class="section-num">1</div>
    <div class="section-title">품목 및 수량 선택</div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">🍎 과일 (국내산)</div>
      <div class="tab" onclick="switchTab(1)">🌴 과일 (수입)</div>
      <div class="tab" onclick="switchTab(2)">🥦 채소 (국내산)</div>
      <div class="tab" onclick="switchTab(3)">🐟 냉동수산물</div>
      <div class="tab" onclick="switchTab(4)">🥚 기타</div>
    </div>
  </div>

  <!-- 카테고리별 품목 -->
  <div id="cat-0" class="product-list">
    <!-- 과일 국내산 -->
  </div>
  <div id="cat-1" class="product-list category-hidden"></div>
  <div id="cat-2" class="product-list category-hidden"></div>
  <div id="cat-3" class="product-list category-hidden"></div>
  <div id="cat-4" class="product-list category-hidden"></div>
</div>

<!-- 수령방법 -->
<div class="section">
  <div class="section-header">
    <div class="section-num">2</div>
    <div class="section-title">수령방법</div>
  </div>
  <div class="method-options">
    <div class="method-btn" id="method-delivery" onclick="selectMethod('delivery')">
      <div class="method-icon">🚚</div>
      <div class="method-label">배송</div>
      <div class="method-sub">최소 25,000원</div>
    </div>
    <div class="method-btn" id="method-pickup" onclick="selectMethod('pickup')">
      <div class="method-icon">🏪</div>
      <div class="method-label">픽업</div>
      <div class="method-sub">금액 제한 없음</div>
    </div>
  </div>
</div>

<div class="min-order-notice" id="minOrderNotice">
  ⚠️ 배송 최소 주문금액은 25,000원입니다. 현재 <span id="currentTotal2">0원</span> 입니다.
</div>

<!-- 결제수단 -->
<div class="section">
  <div class="section-header">
    <div class="section-num">3</div>
    <div class="section-title">결제수단</div>
  </div>
  <div class="payment-options">
    <div class="payment-btn" id="pay-card" onclick="selectPayment('card')">
      <div class="payment-icon">💳</div>
      <div class="payment-label">카드결제</div>
    </div>
    <div class="payment-btn" id="pay-seoul" onclick="selectPayment('seoul')">
      <div class="payment-icon">🏙️</div>
      <div class="payment-label">서울페이</div>
    </div>
    <div class="payment-btn" id="pay-transfer" onclick="selectPayment('transfer')">
      <div class="payment-icon">🏦</div>
      <div class="payment-label">계좌이체</div>
    </div>
  </div>
</div>

<!-- 고객정보 -->
<div class="section">
  <div class="section-header">
    <div class="section-num">4</div>
    <div class="section-title">고객정보</div>
  </div>
  <div class="form-fields">
    <div>
      <div class="field-label">주문자명 *</div>
      <input class="field-input" id="customerName" type="text" placeholder="주문자명을 입력해 주세요">
    </div>
    <div class="address-field" id="addressField" style="display:none">
      <div class="field-label">주소 *</div>
      <input class="field-input" id="customerAddress" type="text" placeholder="아파트는 아파트명/동/호수만 써주세요">
    </div>
    <div>
      <div class="field-label">연락처 *</div>
      <input class="field-input" id="customerPhone" type="tel" placeholder="010-0000-0000" value="010-" maxlength="13">
    </div>
    <div id="pickupTimeField" style="display:none">
      <div class="field-label">픽업 예상시간</div>
      <input class="field-input" id="customerPickupTime" type="text" placeholder="예) 오후 2시, 18:00 등">
    </div>
  </div>
</div>

<!-- 하단 주문 바 -->
<div class="order-bar">
  <div class="order-bar-inner">
    <div class="order-total-wrap">
      <div class="order-total-label">총 주문금액</div>
      <div class="order-total-amount" id="bottomTotal">0원</div>
    </div>
    <button class="order-btn" id="orderBtn" onclick="submitOrder()" disabled>주문하기</button>
  </div>
</div>

<script>
// =====================
// 품목 데이터 (Google Sheets 연동 전 임시 샘플)
// =====================
const products = [
  // 과일 국내산
  { cat: 0, name: '사과 (후지)', unit: '박스', weight: '10kg', price: 35000 },
  { cat: 0, name: '사과 (홍로)', unit: '봉', weight: '1.5kg', price: 12000 },
  { cat: 0, name: '배 (신고)', unit: '박스', weight: '7.5kg', price: 42000 },
  { cat: 0, name: '딸기 (설향)', unit: '팩', weight: '500g', price: 8000 },
  { cat: 0, name: '감귤', unit: '박스', weight: '5kg', price: 18000 },
  // 과일 수입
  { cat: 1, name: '바나나', unit: '송이', weight: '1.2kg', price: 4500 },
  { cat: 1, name: '망고 (태국산)', unit: '개', weight: '350g', price: 3500 },
  { cat: 1, name: '오렌지 (미국산)', unit: '봉', weight: '2kg', price: 9000 },
  { cat: 1, name: '샤인머스캣 (중국산)', unit: '송이', weight: '800g', price: 9800 },
  // 채소
  { cat: 2, name: '대파', unit: '단', weight: '1단', price: 2500 },
  { cat: 2, name: '양파', unit: '망', weight: '3kg', price: 6000 },
  { cat: 2, name: '감자', unit: '박스', weight: '5kg', price: 14000 },
  { cat: 2, name: '당근', unit: '봉', weight: '1kg', price: 3000 },
  // 냉동수산물
  { cat: 3, name: '냉동 새우 (국내산)', unit: '봉', weight: '500g', price: 12000 },
  { cat: 3, name: '냉동 오징어 (수입)', unit: '마리', weight: '300g', price: 4000 },
  { cat: 3, name: '냉동 고등어 (국내산)', unit: '팩', weight: '1kg', price: 9500 },
  // 기타
  { cat: 4, name: '달걀 (특란)', unit: '판', weight: '30구', price: 7500 },
  { cat: 4, name: '달걀 (대란)', unit: '판', weight: '30구', price: 6800 },
];

// 수량 저장
const quantities = {};
let selectedMethod = null;
let selectedPayment = null;
let currentTab = 0;

// 날짜 표시
const now = new Date();
const days = ['일','월','화','수','목','금','토'];
document.getElementById('todayDate').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

// 품목 렌더링
function renderProducts() {
  for (let c = 0; c < 5; c++) {
    const list = document.getElementById(`cat-${c}`);
    const items = products.filter(p => p.cat === c);
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-tab">등록된 품목이 없습니다</div>';
      continue;
    }
    list.innerHTML = items.map((p, i) => {
      const key = `${c}-${i}`;
      return `
        <div class="product-item" id="item-${key}">
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span>${p.unit}</span>
              <span class="product-meta-dot"></span>
              <span>${p.weight}</span>
            </div>
            <div class="product-price">${p.price.toLocaleString()}원</div>
            <div class="product-subtotal" id="sub-${key}"></div>
          </div>
          <select class="qty-select" id="qty-${key}" onchange="updateQty('${key}', ${c}, ${i}, this)">
            <option value="0">0</option>
            ${Array.from({length:20},(_,n)=>`<option value="${n+1}">${n+1}</option>`).join('')}
          </select>
        </div>`;
    }).join('');
  }
}

function updateQty(key, cat, idx, sel) {
  const qty = parseInt(sel.value);
  quantities[key] = qty;
  const p = products.filter(pr => pr.cat === cat)[idx];
  const subEl = document.getElementById(`sub-${key}`);
  const itemEl = document.getElementById(`item-${key}`);
  if (qty > 0) {
    subEl.textContent = `소계: ${(p.price * qty).toLocaleString()}원`;
    sel.classList.add('has-value');
    itemEl.classList.add('selected');
  } else {
    subEl.textContent = '';
    sel.classList.remove('has-value');
    itemEl.classList.remove('selected');
  }
  updateTotal();
}

function getTotal() {
  let total = 0;
  for (const key in quantities) {
    const [c, i] = key.split('-').map(Number);
    const p = products.filter(pr => pr.cat === c)[i];
    total += p.price * quantities[key];
  }
  return total;
}

function updateTotal() {
  const total = getTotal();
  const fmt = total.toLocaleString() + '원';
  document.getElementById('headerTotal').textContent = fmt;
  document.getElementById('bottomTotal').textContent = fmt;
  document.getElementById('currentTotal2').textContent = fmt;
  checkMinOrder();
  updateOrderBtn();
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('[id^="cat-"]').forEach((el,i) => el.classList.toggle('category-hidden', i!==idx));
  currentTab = idx;
}

function selectMethod(m) {
  selectedMethod = m;
  document.getElementById('method-delivery').classList.toggle('active', m==='delivery');
  document.getElementById('method-pickup').classList.toggle('active', m==='pickup');
  const addrField = document.getElementById('addressField');
  const pickupTimeField = document.getElementById('pickupTimeField');
  if (m === 'delivery') {
    addrField.style.display = 'block';
    pickupTimeField.style.display = 'none';
  } else {
    addrField.style.display = 'none';
    pickupTimeField.style.display = 'block';
  }
  checkMinOrder();
  updateOrderBtn();
}

function checkMinOrder() {
  const notice = document.getElementById('minOrderNotice');
  if (selectedMethod === 'delivery' && getTotal() < 25000) {
    notice.classList.add('show');
  } else {
    notice.classList.remove('show');
  }
}

function selectPayment(p) {
  selectedPayment = p;
  ['card','seoul','transfer'].forEach(k =>
    document.getElementById(`pay-${k}`).classList.toggle('active', k===p));
  updateOrderBtn();
}

function updateOrderBtn() {
  const btn = document.getElementById('orderBtn');
  const total = getTotal();
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const addr = document.getElementById('customerAddress').value.trim();

  let ok = total > 0 && selectedMethod && selectedPayment && name && phone;
  if (selectedMethod === 'delivery') {
    ok = ok && total >= 25000 && addr;
  }
  btn.disabled = !ok;
}

document.getElementById('customerName').addEventListener('input', updateOrderBtn);
document.getElementById('customerPhone').addEventListener('input', function(e) {
  let val = e.target.value.replace(/[^0-9]/g, '');
  if (!val.startsWith('010')) val = '010' + val.replace(/^010/, '');
  if (val.length <= 3) {
    e.target.value = '010-';
  } else if (val.length <= 7) {
    e.target.value = '010-' + val.slice(3);
  } else {
    e.target.value = '010-' + val.slice(3, 7) + '-' + val.slice(7, 11);
  }
  updateOrderBtn();
});
document.getElementById('customerAddress').addEventListener('input', updateOrderBtn);

function submitOrder() {
  const total = getTotal();
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const addr = document.getElementById('customerAddress').value.trim();

  const items = [];
  for (const key in quantities) {
    if (quantities[key] > 0) {
      const [c, i] = key.split('-').map(Number);
      const p = products.filter(pr => pr.cat === c)[i];
      items.push({ ...p, qty: quantities[key], subtotal: p.price * quantities[key] });
    }
  }

  const pickupTime = document.getElementById('customerPickupTime').value.trim();
  const order = { name, phone, addr, pickupTime, method: selectedMethod, payment: selectedPayment, total, items, date: now.toLocaleDateString('ko-KR') };
  localStorage.setItem('palpal_order', JSON.stringify(order));
  window.location.href = 'result.html';
}

renderProducts();
</script>
